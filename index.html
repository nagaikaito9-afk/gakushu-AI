<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ひらめきシミュレーター Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI ひらめきシミュレーター 💡</h1>
            <p>データ保存・検証チャット・複雑記号解読モード搭載！</p>
        </header>

        <div class="settings-panel panel">
            <h2>⚙️ 1. モードと設定</h2>
            <div class="settings-container">
                <div class="setting-row">
                    <label>🧠 モード選択：</label>
                    <select id="mode-select">
                        <option value="standard" selected>通常モード (変数の重みを学習)</option>
                        <option value="complex">複雑モード (文字列から謎の記号を解読)</option>
                    </select>
                </div>
                <div class="setting-row" id="var-count-container">
                    <label>手がかりの数：</label>
                    <select id="variable-count">
                        <option value="1">1つ (Aだけ)</option>
                        <option value="2" selected>2つ (A と B)</option>
                        <option value="3">3つ (A, B, C)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>スピード：</label>
                    <input type="range" id="speed-slider" min="1" max="100" value="1">
                    <span id="speed-val" class="highlight-val">1</span>倍速
                </div>
            </div>
        </div>

        <div class="dashboard">
            <div class="panel data-panel">
                <h2>📝 2. AIにヒント（データ）を教える</h2>
                <div class="sample-box">
                    <button id="saveCluesBtn">💾 現在の手がかりを保存</button>
                    <button id="loadCluesBtn">📂 保存した手がかりを復元</button>
                </div>

                <div id="dynamic-input-form" class="input-form">
                    </div>
                
                <div class="table-container">
                    <table id="data-table">
                        <thead><tr id="table-header"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel brain-panel">
                <h2>🧠 3. AIの脳内（ひらめきプロセス）</h2>
                <div class="controls">
                    <button id="startBtn" class="btn-primary">▶️ 学習スタート</button>
                    <button id="pauseBtn">⏸️ 一時停止</button>
                    <button id="resetBtn" class="btn-danger">🔄 記憶をリセット</button>
                </div>
                <div class="formula-box">
                    <p>💡 AIが手探りで組み立てている「ルール」</p>
                    <div id="dynamic-equation" class="equation"></div>
                </div>
                <div class="stats">
                    <p>考え直した回数: <span id="epoch-count" class="highlight-val">0</span> 回</p>
                    <p>間違いの大きさ: <span id="loss-text" class="highlight-val">0.00000</span></p>
                </div>
            </div>
        </div>

        <div id="result-panel" class="panel result-panel hidden">
            <h2>🎉 4. AIがルールをひらめきました！</h2>
            <div class="result-content">
                <div class="explanation">
                    <h3>💬 AIによる「謎のルール」の解説</h3>
                    <div id="rule-description" class="rule-text"></div>
                    <button id="saveRuleBtn" class="btn-primary" style="margin-top:15px; width:100%;">💾 このルールを保存して検証ルームへ送る</button>
                </div>
            </div>
        </div>

        <div class="panel saved-rules-panel">
            <h2>🧪 5. 検証ルーム（保存されたルール）</h2>
            <p class="guide-text">保存したルールを呼び出して、AIをテストしたり矛盾を指摘されたりできます。</p>
            <div id="saved-rules-list" class="rules-list">
                <p style="color:#62688f;">まだ保存されたルールはありません。</p>
            </div>
            
            <div id="test-room" class="test-room hidden">
                <h3 style="color:var(--primary-color);">🤖 AIテストチャット</h3>
                <p id="test-room-info" style="font-size: 0.9rem; color: #a9aec4;"></p>
                
                <div id="test-chat-log" class="chat-log"></div>
                
                <div class="chat-input-area">
                    <input type="text" id="chat-input-q" placeholder="例: Aが2でBが3の時..." style="flex:2;">
                    <input type="number" id="chat-input-a" placeholder="答えの予想" style="flex:1;">
                    <button id="chatSendBtn">出題する！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
